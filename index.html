<!DOCTYPE html>
<html>
<head>
  <title>House VR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Movement -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
</head>

<body>
<a-scene>

  <!-- 🌤 Sky -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- 💡 Strong Lighting -->
  <a-entity light="type: ambient; intensity: 1.5"></a-entity>
  <a-entity light="type: directional; intensity: 1" position="5 10 5"></a-entity>

  <!-- 🎮 Camera closer to model -->
  <a-entity id="rig" position="0 1.6 2" movement-controls="speed: 0.2">

    <a-entity camera look-controls wasd-controls></a-entity>

  </a-entity>

  <!-- 📦 Assets -->
  <a-assets>
    <!-- ✅ make sure file exists in SAME folder -->
    <a-asset-item id="house" src="./autumn_house.glb"></a-asset-item>
  </a-assets>

  <!-- 🏠 House Model -->
  <a-entity 
    gltf-model="#house"
    position="0 0 -3"
    scale="0.5 0.5 0.5"
    rotation="0 180 0">
  </a-entity>

  <!-- 🌱 Ground -->
  <a-plane 
    rotation="-90 0 0" 
    width="50" 
    height="50" 
    color="#7CFC00">
  </a-plane>

</a-scene>
</body>
</html>
